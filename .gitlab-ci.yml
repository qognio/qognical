# GitLab CI/CD for qognical
# Stages: test → build → container → release
#
# Designed for self-hosted GitLab Runner (Docker executor). Requires:
#   - CI_REGISTRY_USER / CI_REGISTRY_PASSWORD       (auto via GitLab Container Registry)
#   - GHCR_TOKEN  (optional, for mirroring releases to ghcr.io/qognio/qognical)

stages:
  - test
  - build
  - container
  - release

variables:
  GO_VERSION: "1.25"
  CGO_ENABLED: "0"
  DOCKER_BUILDKIT: "1"

default:
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git make ca-certificates

# ────────────────────────────────────────────────────────────────────────────
# Stage 1: test
# ────────────────────────────────────────────────────────────────────────────

test:
  stage: test
  script:
    - go vet ./...
    - go test -race -coverprofile=cover.out ./...
    - go tool cover -func=cover.out | tail -1
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - cover.out
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ────────────────────────────────────────────────────────────────────────────
# Stage 2: build  (linux + darwin, amd64 + arm64)
# ────────────────────────────────────────────────────────────────────────────

.build-template: &build-template
  stage: build
  script:
    - mkdir -p dist
    - GOOS=$BUILD_OS GOARCH=$BUILD_ARCH go build -trimpath -ldflags="-s -w" -o dist/qognical-${BUILD_OS}-${BUILD_ARCH} ./cmd/qognical
    - cd dist && sha256sum qognical-${BUILD_OS}-${BUILD_ARCH} > qognical-${BUILD_OS}-${BUILD_ARCH}.sha256
  artifacts:
    paths:
      - dist/
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:linux-amd64:
  <<: *build-template
  variables:
    BUILD_OS: linux
    BUILD_ARCH: amd64

build:linux-arm64:
  <<: *build-template
  variables:
    BUILD_OS: linux
    BUILD_ARCH: arm64

build:darwin-amd64:
  <<: *build-template
  variables:
    BUILD_OS: darwin
    BUILD_ARCH: amd64

build:darwin-arm64:
  <<: *build-template
  variables:
    BUILD_OS: darwin
    BUILD_ARCH: arm64

# ────────────────────────────────────────────────────────────────────────────
# Stage 3: container image — push to GitLab Container Registry
# ────────────────────────────────────────────────────────────────────────────

container:
  stage: container
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - IMAGE="$CI_REGISTRY_IMAGE"
    - TAG="${CI_COMMIT_TAG:-latest}"
    - docker build --build-arg GO_VERSION=${GO_VERSION} -t "$IMAGE:$TAG" .
    - if [ -n "$CI_COMMIT_TAG" ]; then docker tag "$IMAGE:$TAG" "$IMAGE:latest"; fi
    - docker push "$IMAGE:$TAG"
    - if [ -n "$CI_COMMIT_TAG" ]; then docker push "$IMAGE:latest"; fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ────────────────────────────────────────────────────────────────────────────
# Stage 4: release  (only on tag)  — GitLab Release + optional ghcr mirror
# ────────────────────────────────────────────────────────────────────────────

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:darwin-amd64
    - build:darwin-arm64
    - container
  script:
    - echo "Releasing $CI_COMMIT_TAG"
  release:
    name: "qognical $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      Automated release for $CI_COMMIT_TAG.

      Binaries: linux/amd64, linux/arm64, darwin/amd64, darwin/arm64.
      Container: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG

      Verify: each binary ships a `.sha256` next to it.
    assets:
      links:
        - name: "Container image (GitLab Registry)"
          url: "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
          link_type: image

# Optional: mirror container image to ghcr.io/qognio/qognical on tag.
# Activate by adding GHCR_TOKEN (Personal Access Token, packages:write scope)
# as a protected GitLab CI variable.
release:ghcr-mirror:
  stage: release
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: $CI_COMMIT_TAG && $GHCR_TOKEN
  needs:
    - container
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u qognio --password-stdin
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker pull "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" "ghcr.io/qognio/qognical:$CI_COMMIT_TAG"
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" "ghcr.io/qognio/qognical:latest"
    - docker push "ghcr.io/qognio/qognical:$CI_COMMIT_TAG"
    - docker push "ghcr.io/qognio/qognical:latest"
